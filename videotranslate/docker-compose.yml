version: '3.9'

services:
  app:
    build: .
    container_name: videotranslate-ai
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:3001}
    volumes:
      - uploads:/app/public/uploads
      - outputs:/app/public/outputs
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  uploads:
  outputs:
